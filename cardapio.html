/* FUNDO */

ul{
list-style:none;
}

li{
padding:14px 0;
border-bottom:1px solid #eee;
}

/* CHECKBOX + TEXTO */

label{
display:flex;
align-items:center;
gap:12px;
font-size:20px;
cursor:pointer;
}

/* CHECKBOX GRANDE */

input{
width:22px;
height:22px;
}

/* TEXTOS */

p{
font-size:18px;
margin-top:10px;
}

/* BOTÃO */

.botao{
margin-top:30px;
}

button{
width:100%;
padding:22px;
font-size:22px;

color:white;
border:none;

button:hover{

/* RESPONSIVO CELULAR */

@media (max-width:600px){

.cardapio h1{
